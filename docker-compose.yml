services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    command: sh -c "pnpm install && pnpm dev" # invalidate docker cache when add a package
    depends_on:
      - postgres

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shamebell}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    env_file:
      - .env
    command: sh -c "npx knex migrate:latest --knexfile knexfile.js"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  node_modules:
  postgres_data:
